<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Diagnostic d'offre — Pierre Dopa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Mulish:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --ink:   #14181f;
      --gray:  #8b9099;
      --bg:    #ffffff;
      --line:  #ececef;
      --blue:  #8bc1f2;
      --red:   #fb8181;
      --mint:  #34c2a8;
      --amber: #e8a13c;
      --font-display: "Poppins", system-ui, sans-serif;
      --font-body:    "Mulish", system-ui, sans-serif;
      --font-hand:    "Caveat", cursive;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3 { margin: 0; font-family: var(--font-display); }
    p { margin: 0; }
    button { font-family: var(--font-display); cursor: pointer; }

    .page { max-width: 820px; margin: 0 auto; padding: 0 clamp(22px, 5vw, 56px); }

    .art-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: clamp(24px, 4vh, 40px) 0 0;
    }
    .back {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-display); font-size: 15px;
      font-weight: 600; color: var(--gray); transition: color .18s;
    }
    .back:hover { color: var(--ink); }
    .back:hover .arr { transform: translateX(-3px); }
    .arr { display: inline-block; transition: transform .18s; }
    .brand { font-family: var(--font-display); font-weight: 700; font-size: 17px; }

    .tool-head { padding: clamp(34px, 6vh, 64px) 0 clamp(22px, 3vh, 30px); }
    .kicker {
      display: inline-block; font-family: var(--font-display);
      font-weight: 600; font-size: 12px; letter-spacing: .1em;
      text-transform: uppercase; color: var(--red); margin-bottom: 16px;
    }
    .tool-title {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(30px, 5vw, 52px); line-height: 1.08;
      letter-spacing: -.025em; max-width: 16ch;
    }
    .mark { position: relative; white-space: nowrap; }
    .mark svg { position: absolute; left: -8px; right: -8px; bottom: -10px; width: calc(100% + 16px); height: 16px; pointer-events: none; overflow: visible; }
    .squiggle-path { stroke: var(--mint); stroke-width: 3.4; fill: none; stroke-linecap: round; }
    .tool-sub {
      margin-top: 22px; font-size: clamp(17px, 1.5vw, 20px);
      color: var(--gray); line-height: 1.6; max-width: 48ch;
    }

    .input-wrap { padding-bottom: 90px; }
    .ta-shell {
      position: relative; margin-top: 8px;
      border: 1.5px solid var(--line); border-radius: 18px;
      background: #fcfcfb; transition: border-color .2s, box-shadow .2s;
    }
    .ta-shell:focus-within {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(139,193,242,.18);
    }
    textarea {
      width: 100%; min-height: 280px; resize: vertical;
      border: 0; background: transparent; outline: none;
      padding: 22px 24px; border-radius: 18px;
      font-family: var(--font-body); font-size: 16px; line-height: 1.6;
      color: var(--ink);
    }
    textarea::placeholder { color: #b4b9c1; }
    .ta-foot {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 14px; margin-top: 18px;
    }
    .ta-meta { display: flex; align-items: center; gap: 16px; }
    .char-count { font-size: 13px; color: var(--gray); font-family: var(--font-display); }
    .link-btn {
      background: none; border: 0; padding: 0;
      font-family: var(--font-display); font-weight: 600; font-size: 14px;
      color: var(--gray); text-decoration: underline; text-underline-offset: 3px;
      transition: color .18s;
    }
    .link-btn:hover { color: var(--ink); }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: var(--font-display); font-weight: 600; font-size: 16px;
      background: var(--ink); color: #fff;
      padding: 15px 30px; border-radius: 999px; border: 0;
      transition: transform .18s, opacity .18s;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); }
    .btn-primary:disabled { opacity: .45; cursor: default; }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-display); font-weight: 600; font-size: 15px;
      background: #f1f2f4; color: var(--ink);
      padding: 13px 26px; border-radius: 999px; border: 0;
      transition: background .18s, transform .18s;
    }
    .btn-ghost:hover { background: #e6e8eb; transform: translateY(-2px); }

    .loading {
      padding: 80px 0 120px; display: flex; flex-direction: column;
      align-items: center; gap: 26px; text-align: center;
    }
    .loading-doodle { width: 120px; height: 80px; }
    .scribble {
      stroke: var(--mint); stroke-width: 3; fill: none; stroke-linecap: round;
      stroke-dasharray: 320; stroke-dashoffset: 320;
      animation: draw 1.6s ease-in-out infinite;
    }
    @keyframes draw {
      0%   { stroke-dashoffset: 320; }
      55%  { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -320; }
    }
    .loading-text { font-family: var(--font-display); font-weight: 600; font-size: 19px; }
    .loading-sub  { color: var(--gray); font-size: 15px; max-width: 32ch; }

    .results { padding-bottom: 100px; }
    .res-top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .res-back {
      background: none; border: 0; padding: 0;
      font-family: var(--font-display); font-weight: 600; font-size: 14px;
      color: var(--gray); display: inline-flex; align-items: center; gap: 7px;
      transition: color .18s; cursor: pointer;
    }
    .res-back:hover { color: var(--ink); }

    .score-hero {
      display: grid; grid-template-columns: auto 1fr; gap: clamp(26px, 5vw, 52px);
      align-items: center;
      padding: clamp(30px, 5vw, 46px) 0 clamp(30px, 4vw, 44px);
      border-bottom: 1px solid var(--line);
    }
    @media (max-width: 600px) { .score-hero { grid-template-columns: 1fr; justify-items: center; text-align: center; } }
    .ring-wrap { position: relative; width: 168px; height: 168px; }
    .ring-num {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ring-num b { font-family: var(--font-display); font-weight: 700; font-size: 52px; line-height: 1; letter-spacing: -.03em; }
    .ring-num span { font-size: 13px; color: var(--gray); font-family: var(--font-display); font-weight: 600; margin-top: 4px; }
    .verdict-label {
      font-family: var(--font-display); font-weight: 600; font-size: 13px;
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: 12px;
    }
    .verdict-text {
      font-family: var(--font-display); font-weight: 600;
      font-size: clamp(22px, 3vw, 30px); line-height: 1.25; letter-spacing: -.01em;
      max-width: 22ch;
    }

    .section-h {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(20px, 2.4vw, 26px); letter-spacing: -.01em;
      margin: clamp(44px, 6vh, 64px) 0 24px;
    }
    .dims { display: grid; gap: 22px; }
    .dim-row { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .dim-top { display: flex; align-items: baseline; justify-content: space-between; gap: 14px; }
    .dim-name  { font-family: var(--font-display); font-weight: 600; font-size: 17px; }
    .dim-score { font-family: var(--font-display); font-weight: 700; font-size: 17px; }
    .dim-track { height: 9px; border-radius: 999px; background: #f0f1f3; overflow: hidden; }
    .dim-fill  { height: 100%; border-radius: 999px; transition: width .9s cubic-bezier(.2,.8,.2,1); }
    .dim-note  { font-size: 14.5px; color: var(--gray); line-height: 1.55; max-width: 58ch; }

    .weak-list { display: grid; gap: 16px; }
    .weak-card {
      border: 1.5px solid var(--line); border-radius: 16px;
      padding: 22px 24px; background: #fff;
      display: grid; grid-template-columns: auto 1fr; gap: 18px; align-items: start;
    }
    .weak-rank {
      width: 30px; height: 30px; border-radius: 50%; flex: none;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 700; font-size: 15px;
      background: var(--red); color: #fff;
    }
    .weak-title  { font-family: var(--font-display); font-weight: 600; font-size: 18px; margin-bottom: 7px; }
    .weak-prob   { font-size: 15.5px; color: var(--gray); line-height: 1.6; margin-bottom: 12px; }
    .weak-action { font-size: 15px; line-height: 1.55; color: var(--ink); padding-left: 14px; border-left: 2.5px solid var(--mint); }
    .weak-action b { font-family: var(--font-display); font-weight: 600; }

    .profils { display: grid; gap: 14px; }
    .profil-card {
      display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: start;
      padding: 18px 4px;
    }
    .profil-card + .profil-card { border-top: 1px solid var(--line); }
    .profil-icon { font-size: 22px; line-height: 1.2; }
    .profil-name { font-family: var(--font-display); font-weight: 600; font-size: 16.5px; margin-bottom: 4px; }
    .profil-why  { font-size: 15px; color: var(--gray); line-height: 1.6; }

    .hand-note {
      font-family: var(--font-hand); font-size: 21px; color: var(--gray);
      transform: rotate(-3deg); display: inline-block; margin-top: 6px;
    }
    .err {
      margin-top: 22px; padding: 16px 20px; border-radius: 14px;
      background: #fff3f3; border: 1.5px solid #ffd9d9;
      color: #c0392b; font-size: 15px; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SAMPLE = `Chargé(e) de clientèle H/F

Nous recherchons notre futur talent pour rejoindre une équipe dynamique au sein d'une entreprise leader sur son marché. Vous êtes le candidat idéal si vous êtes un véritable chasseur, autonome, rigoureux et que vous avez le goût du challenge.

Missions :
- Développer et fidéliser un portefeuille clients
- Atteindre et dépasser vos objectifs commerciaux
- Être force de proposition

Profil recherché :
- Bac+5 minimum (école de commerce exigée)
- 5 ans d'expérience minimum sur un poste similaire
- Maîtrise parfaite de l'anglais
- Excellent relationnel, dynamisme à toute épreuve
- Permis B obligatoire
- Disponibilité immédiate

Rejoignez l'aventure et venez relever de nouveaux défis dans une ambiance familiale !`;

    function scoreColor(s) {
      if (s < 40) return '#fb8181';
      if (s < 70) return '#e8a13c';
      return '#34c2a8';
    }
    function verdictWord(s) {
      if (s < 40) return { label: 'À retravailler', color: '#fb8181' };
      if (s < 70) return { label: 'Perfectible',   color: '#e8a13c' };
      return           { label: 'Solide',           color: '#34c2a8' };
    }

    function parseResult(raw) {
      let txt = raw.trim().replace(/^```(json)?/i, '').replace(/```$/, '').trim();
      const start = txt.indexOf('{');
      if (start >= 0) txt = txt.slice(start);
      const end = txt.lastIndexOf('}');
      if (end >= 0) txt = txt.slice(0, end + 1);
      try { return JSON.parse(txt); } catch (e) { return JSON.parse(repairJson(txt)); }
    }

    function repairJson(s) {
      let t = s;
      const last = Math.max(t.lastIndexOf('"}'), t.lastIndexOf('"]'), t.lastIndexOf('}'), t.lastIndexOf(']'));
      if (last > 0) t = t.slice(0, last + 1);
      if (((t.match(/(?<!\\)"/g)) || []).length % 2 !== 0) t += '"';
      const stack = []; let inStr = false, prev = '';
      for (const ch of t) {
        if (ch === '"' && prev !== '\\') inStr = !inStr;
        else if (!inStr && (ch === '{' || ch === '[')) stack.push(ch);
        else if (!inStr && (ch === '}' || ch === ']')) stack.pop();
        prev = ch;
      }
      t = t.replace(/,\s*$/, '');
      while (stack.length) t += stack.pop() === '{' ? '}' : ']';
      return t;
    }

    async function analyze(offer) {
      const r = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ offer }),
      });
      if (!r.ok) throw new Error('Erreur serveur');
      const { text } = await r.json();
      return parseResult(text);
    }

    function ScoreRing({ score }) {
      const r = 74, c = 2 * Math.PI * r;
      const col = scoreColor(score);
      const [dash, setDash] = useState(c);
      useEffect(() => {
        const t = setTimeout(() => setDash(c * (1 - score / 100)), 120);
        return () => clearTimeout(t);
      }, [score, c]);
      return (
        <div className="ring-wrap">
          <svg width="168" height="168" viewBox="0 0 168 168">
            <circle cx="84" cy="84" r={r} fill="none" stroke="#f0f1f3" strokeWidth="13" />
            <circle cx="84" cy="84" r={r} fill="none" stroke={col} strokeWidth="13"
              strokeLinecap="round" strokeDasharray={c} strokeDashoffset={dash}
              transform="rotate(-90 84 84)"
              style={{ transition: 'stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1)' }} />
          </svg>
          <div className="ring-num">
            <b style={{ color: col }}>{score}</b>
            <span>/ 100</span>
          </div>
        </div>
      );
    }

    function InputView({ offer, setOffer, onAnalyze, error }) {
      return (
        <div className="input-wrap">
          <div className="tool-head">
            <span className="kicker">Outil recruteur</span>
            <h1 className="tool-title">
              Votre offre attire-t-elle&nbsp;
              <span className="mark">les bons profils
                <svg viewBox="0 0 200 16" preserveAspectRatio="none">
                  <path className="squiggle-path" d="M3,11 Q40,4 80,9 Q130,15 197,5" />
                </svg>
              </span>&nbsp;?
            </h1>
            <p className="tool-sub">
              Collez le texte de votre annonce. En quelques secondes, vous obtenez un score sur
              quatre dimensions, les changements prioritaires, et les profils que votre offre
              fait fuir sans que vous le sachiez.
            </p>
          </div>

          <div className="ta-shell">
            <textarea
              value={offer}
              onChange={e => setOffer(e.target.value)}
              placeholder="Collez ici le texte complet de votre offre d'emploi…"
            />
          </div>

          <div className="ta-foot">
            <div className="ta-meta">
              <span className="char-count">{offer.trim().length} caractères</span>
              <button className="link-btn" onClick={() => setOffer(SAMPLE)}>
                Essayer avec un exemple
              </button>
            </div>
            <button className="btn-primary" disabled={offer.trim().length <= 40} onClick={onAnalyze}>
              Analyser l'offre <span>→</span>
            </button>
          </div>

          {error && <div className="err">{error}</div>}
        </div>
      );
    }

    function LoadingView() {
      const steps = ['Lecture de l’annonce…','Mesure de la transparence…','Analyse du langage…','Recherche des profils exclus…'];
      const [i, setI] = useState(0);
      useEffect(() => {
        const t = setInterval(() => setI(p => (p + 1) % steps.length), 1400);
        return () => clearInterval(t);
      }, []);
      return (
        <div className="loading">
          <svg className="loading-doodle" viewBox="0 0 120 80" fill="none">
            <path className="scribble" d="M8,52 Q20,18 34,46 Q44,66 56,38 Q66,14 80,48 Q90,70 100,40 Q106,22 114,34" />
          </svg>
          <div>
            <div className="loading-text">{steps[i]}</div>
            <div className="loading-sub" style={{ marginTop: 8 }}>On passe l'offre au crible des quatre dimensions.</div>
          </div>
        </div>
      );
    }

    function ResultsView({ data, onReset }) {
      const v = verdictWord(data.scoreGlobal);
      return (
        <div className="results">
          <div className="res-top">
            <button className="res-back" onClick={onReset}>← Analyser une autre offre</button>
          </div>

          <div className="score-hero">
            <ScoreRing score={data.scoreGlobal} />
            <div>
              <div className="verdict-label" style={{ color: v.color }}>{v.label}</div>
              <div className="verdict-text">{data.verdict}</div>
            </div>
          </div>

          <h2 className="section-h">Les quatre dimensions</h2>
          <div className="dims">
            {data.dimensions.map((d, k) => (
              <div className="dim-row" key={k}>
                <div className="dim-top">
                  <span className="dim-name">{d.nom}</span>
                  <span className="dim-score" style={{ color: scoreColor(d.score) }}>{d.score}</span>
                </div>
                <div className="dim-track">
                  <div className="dim-fill" style={{ width: d.score + '%', background: scoreColor(d.score) }} />
                </div>
                {d.commentaire && <p className="dim-note">{d.commentaire}</p>}
              </div>
            ))}
          </div>

          <h2 className="section-h">À changer en priorité</h2>
          <div className="weak-list">
            {data.pointsFaibles.map((w, k) => (
              <div className="weak-card" key={k}>
                <div className="weak-rank">{k + 1}</div>
                <div>
                  <div className="weak-title">{w.titre}</div>
                  <p className="weak-prob">{w.probleme}</p>
                  <p className="weak-action"><b>À faire :</b> {w.action}</p>
                </div>
              </div>
            ))}
          </div>

          <h2 className="section-h">Les profils que vous loupez</h2>
          <div className="profils">
            {data.profilsExclus.map((p, k) => (
              <div className="profil-card" key={k}>
                <div className="profil-icon">{p.icone || '👤'}</div>
                <div>
                  <div className="profil-name">{p.profil}</div>
                  <p className="profil-why">{p.raison}</p>
                </div>
              </div>
            ))}
          </div>
          <p className="hand-note">… et ils ne vous le diront jamais.</p>
        </div>
      );
    }

    function App() {
      const [stage, setStage] = useState('input');
      const [offer, setOffer] = useState('');
      const [data,  setData]  = useState(null);
      const [error, setError] = useState('');

      async function runAnalysis() {
        setError(''); setStage('loading');
        try {
          const result = await analyze(offer);
          if (!result || !result.dimensions) throw new Error('Réponse inattendue');
          setData(result); setStage('results');
        } catch (e) {
          console.error(e);
          setError("L'analyse n'a pas abouti. Réessayez dans un instant.");
          setStage('input');
        }
      }

      function reset() {
        setData(null); setStage('input');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      return (
        <div className="page">
          <nav className="art-nav">
            <a className="back" href="/"><span className="arr">←</span> Accueil</a>
            <a className="brand" href="/">Pierre Dopa</a>
          </nav>
          {stage === 'input'   && <InputView offer={offer} setOffer={setOffer} onAnalyze={runAnalysis} error={error} />}
          {stage === 'loading' && <LoadingView />}
          {stage === 'results' && data && <ResultsView data={data} onReset={reset} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
