<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Projets — Pierre Dopa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <header id="site-header"></header>

  <main class="inner-main">
    <div class="wrap">
      <h1 class="inner-title">Projets</h1>
      <p class="inner-lead">
        Des <strong>case studies</strong> qui documentent honnêtement comment
        je construis mes outils, et des <strong>outils IA</strong> utilisables
        directement depuis le site.
      </p>

      <section aria-labelledby="case-studies-heading">
        <h2 style="font-size:clamp(20px,2.2vw,26px);font-weight:700;letter-spacing:-.01em;margin-bottom:16px" id="case-studies-heading">Case studies</h2>
        <ul class="project-list-simple" data-project-list="case-study"></ul>
      </section>

      <section aria-labelledby="outils-heading" style="margin-top:clamp(32px,5vh,56px)">
        <h2 style="font-size:clamp(20px,2.2vw,26px);font-weight:700;letter-spacing:-.01em;margin-bottom:16px" id="outils-heading">Outils</h2>
        <ul class="project-list-simple" data-project-list="outil"></ul>
      </section>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="/assets/js/projects-data.js"></script>
  <script src="/assets/js/projects.js"></script>
  <script src="/assets/js/layout.js"></script>
</body>
</html>
